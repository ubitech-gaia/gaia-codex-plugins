interface:
  display_name: 'Gaia Automation'
  short_description: 'Work on a bound Gaia project through OAuth-backed Gaia MCP'
  icon_small: 'assets/gaia-codex-icon.svg'
  icon_large: 'assets/gaia-codex-logo.svg'
  brand_color: '#2563EB'
  default_prompt: 'Use $gaia-automation from a repository that is bound to one Gaia project through gaia.config.json. Read gaia.config.json first. Use gaia at /api/mcp/gaia?tools=all for project spec, evals, delivery process, tasks, milestones, versions, branches, environment promotion, governance, workflows, workflow runs, human-in-the-loop action requests, document folders, UI layouts, and agent/config operations, and pass the configured projectId to every Gaia tool call. Never print or commit values from local .env or .codex/config.toml.'

dependencies:
  tools:
    - type: 'mcp'
      value: 'gaia'
      description: 'OAuth-backed Gaia MCP endpoint with tools=all; Gaia tool calls include projectId from gaia.config.json'
      transport: 'streamable_http'
      url: 'https://thegaia.ai/api/mcp/gaia?tools=all'
